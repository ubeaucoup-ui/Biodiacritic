<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Biodiacritique</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 10px; height: 300px; object-fit: cover; background: #ddd; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; border: none; border-radius: 8px; background: #000; color: #fff; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app" class="card">
        <h1>Test Biodiacritique</h1>
        <p>Prêt à commencer ?</p>
        <button onclick="start()">Démarrer</button>
    </div>

    <script>
        const photos = [
            "nova1_carottes.jpg", "nova1_lentilles.jpg", "nova1_noix.jpg", "nova1_pomme.jpg", "nova1_tomates.jpg",
            "nova2_compote.jpg", "nova2_fromage.jpg", "nova2_pain.jpg", "nova2_pasta.jpg", "nova2_yaourt.jpg",
            "nova3_biscuit.jpg", "nova3_cereales.jpg", "nova3_jambon.jpg", "nova3_nuggets.jpg", "nova3_soupe.jpg",
            "nova4_barre.jpg", "nova4_chips.jpg", "nova4_hamburger.jpg", "nova4_pizza.jpg", "nova4_soda.jpg"
        ];
        let i = 0;

        function start() { load(); }
        function load() {
            if(i >= photos.length) {
                document.getElementById('app').innerHTML = "<h1>Terminé !</h1><p>Merci de votre participation.</p>";
                return;
            }
            document.getElementById('app').innerHTML = `
                <img src="${photos[i]}" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Non+Trouvée'">
                <h2>Produit ${i+1}/20</h2>
                <button onclick="next()">Suivant</button>
            `;
        }
        function next() { i++; load(); }
    </script>
</body>
</html>
